# PPO configuration for the Task319 hover-descent physical gripper controller.
#
# W&B is configured by task319_local_grasp_rl/train.py.  The keys below are
# copied into skrl's native experiment.wandb fields only when --wandb is passed.

seed: 42

wandb:
  project: ${oc.env:WANDB_PROJECT,task319-hover-descent-grasp}
  entity: ${oc.env:WANDB_ENTITY,""}
  name: ""
  tags: ["task319", "kuavo", "hover-descent-grasp", "physical-gripper", "skrl-ppo"]

models:
  separate: false
  policy:
    class: GaussianMixin
    clip_actions: false
    clip_log_std: true
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: -0.5
    network:
      - name: net
        input: OBSERVATIONS
        layers: [256, 128, 64]
        activations: elu
    output: ACTIONS
  value:
    class: DeterministicMixin
    clip_actions: false
    network:
      - name: net
        input: OBSERVATIONS
        layers: [256, 128, 64]
        activations: elu
    output: ONE

memory:
  class: RandomMemory
  memory_size: -1

agent:
  class: PPO
  rollouts: 32
  learning_epochs: 5
  mini_batches: 4
  discount_factor: 0.99
  gae_lambda: 0.95
  learning_rate: 3.0e-04
  learning_rate_scheduler: KLAdaptiveLR
  learning_rate_scheduler_kwargs:
    kl_threshold: 0.012
  observation_preprocessor: RunningStandardScaler
  observation_preprocessor_kwargs: null
  value_preprocessor: RunningStandardScaler
  value_preprocessor_kwargs: null
  random_timesteps: 0
  learning_starts: 0
  grad_norm_clip: 1.0
  ratio_clip: 0.2
  value_clip: 0.2
  entropy_loss_scale: 0.001
  value_loss_scale: 2.0
  kl_threshold: 0.0
  rewards_shaper_scale: 0.01
  time_limit_bootstrap: false
  experiment:
    directory: "task319_hover_descent_grasp"
    experiment_name: ""
    write_interval: auto
    checkpoint_interval: auto
    wandb: false
    wandb_kwargs: {}

trainer:
  class: SequentialTrainer
  timesteps: 96000
  environment_info: log
