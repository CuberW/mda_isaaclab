# SAC configuration for the Task319 hover-descent physical gripper controller.
#
# W&B is configured by task319_local_grasp_rl/train.py. The keys below are
# copied into skrl's native experiment.wandb fields only when --wandb is passed.

seed: 42

wandb:
  project: ${oc.env:WANDB_PROJECT,task319-hover-descent-grasp}
  entity: ${oc.env:WANDB_ENTITY,""}
  name: ""
  tags: ["task319", "kuavo", "hover-descent-grasp", "physical-gripper", "skrl-sac"]

models:
  separate: true
  policy:
    class: GaussianMixin
    clip_actions: false
    clip_log_std: true
    min_log_std: -5.0
    max_log_std: 0.0
    initial_log_std: -2.0
    network:
      - name: net
        input: OBSERVATIONS
        layers: [256, 256, 128]
        activations: elu
    output: tanh(ACTIONS)
  critic_1: &critic
    class: DeterministicMixin
    clip_actions: false
    network:
      - name: net
        input: concatenate([OBSERVATIONS, ACTIONS])
        layers: [256, 256, 128]
        activations: elu
    output: ONE
  critic_2: *critic
  target_critic_1: *critic
  target_critic_2: *critic

memory:
  class: RandomMemory
  memory_size: 4096
  replacement: false

agent:
  class: SAC
  gradient_steps: 1
  batch_size: 4096
  discount_factor: 0.99
  polyak: 0.005
  learning_rate: [3.0e-04, 3.0e-04, 3.0e-04]
  learning_rate_scheduler: null
  learning_rate_scheduler_kwargs: null
  observation_preprocessor: RunningStandardScaler
  observation_preprocessor_kwargs: null
  state_preprocessor: null
  state_preprocessor_kwargs: null
  random_timesteps: 64
  learning_starts: 64
  grad_norm_clip: 1.0
  learn_entropy: true
  initial_entropy_value: 0.2
  target_entropy: null
  rewards_shaper_scale: 0.1
  experiment:
    directory: "task319_hover_descent_grasp_sac"
    experiment_name: ""
    write_interval: auto
    checkpoint_interval: auto
    wandb: false
    wandb_kwargs: {}

trainer:
  class: SequentialTrainer
  timesteps: 120000
  environment_info: log
